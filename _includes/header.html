<header class="site-header">
  <div class="header-inner">
    <a class="site-brand" href="{{ '/' | relative_url }}">
      {{ site.title }}
    </a>
    <nav class="site-nav" aria-label="主导航">
      <a class="nav-link {% if page.url == '/' %}active{% endif %}" href="{{ '/' | relative_url }}">首页</a>
      {%- if site.pages -%}
        {%- for p in site.pages -%}
          {%- if p.title and p.url != "/" -%}
            <a class="nav-link {% if page.url == p.url %}active{% endif %}" href="{{ p.url | relative_url }}">{{ p.title }}</a>
          {%- endif -%}
        {%- endfor -%}
      {%- endif -%}
    </nav>
  </div>
</header>
