<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/bootstrap.min.css" | relative_url }}">

  {%- feed_meta -%}

  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  
  <link rel="icon" type="image/jpeg" href="{{ "/assets/img/b.jpg" | relative_url }}">
  <link rel="apple-touch-icon" href="{{ "/assets/img/b.jpg" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/custom-formula.css" | relative_url }}">

  <style>


.site-header .wrapper {
  display: flex !important;
  justify-content: space-between !important;
  align-items: center !important;
  height: 64px !important;
  padding: 0 20px !important;
  box-sizing: border-box !important;
}

.site-title {
  float: none !important;
  line-height: 64px !important;
  margin: 0 !important;
  padding: 0 !important;
  display: inline-block !important;
  white-space: nowrap !important;
}

/* 3. 核心修复：重置 nav 元素，让它直接成为 Flex 子项 */
.site-nav {
  float: none !important;
  margin: 0 !important;
  padding: 0 !important;
  display: flex !important;
  align-items: center !important;
}

/* 4. 彻底干掉移动端隐藏触发器占用的空间 */
.nav-trigger,
.site-nav label[for="nav-trigger"] {
  display: none !important;  /* 强行消失，绝不占位 */
  width: 0 !important;
  height: 0 !important;
  margin: 0 !important;
  padding: 0 !important;
}

/* 5. 强行把包裹链接的 .trigger 设为 Flex 行内布局 */
.site-nav .trigger {
  display: flex !important;
  flex-direction: row !important; /* 强制水平排列 */
  align-items: center !important;
  gap: 20px !important;           /* 链接之间的间距 */
  margin: 0 !important;
  padding: 0 !important;
}

/* 6. 统一链接的行高，与标题完美对齐 */
.site-nav .page-link {
  display: inline-block !important;
  line-height: 64px !important;   /* 行高与外层 64px 保持一致 */
  margin: 0 !important;
  padding: 0 !important;
}
  </style>
</head>
