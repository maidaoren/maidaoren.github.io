<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/bootstrap.min.css" | relative_url }}">

  {%- feed_meta -%}

  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  
  <link rel="icon" type="image/jpeg" href="{{ "/assets/img/b.jpg" | relative_url }}">
  <link rel="apple-touch-icon" href="{{ "/assets/img/b.jpg" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/custom-formula.css" | relative_url }}">

  <style>
    /* ======================================================= */
    /* 1. 全局链接交互：默认无下划线，悬浮时变知乎蓝+出现下划线 */
    /* ======================================================= */
    a,
    .site-footer a,
    .social-media-list a,
    .social-links a {
      text-decoration: none !important;
      transition: color 0.2s ease; /* 丝滑变色过渡 */
    }

    a:hover,
    .site-footer a:hover,
    .social-media-list a:hover,
    .social-links a:hover {
      color: #0084FF !important;            /* 知乎蓝 */
      text-decoration: underline !important; /* 悬浮下划线 */
    }

    /* 💡 特殊优化：让顶部导航和主标题在悬浮时不出现下划线，保持干净 */
    .site-title:hover,
    .site-nav .page-link:hover {
      text-decoration: none !important; 
      color: #0084FF !important; /* 仅变蓝，不下划线 */
    }

    /* ======================================================= */
    /* 2. 头部导航栏对齐逻辑（Flexbox 弹性单行布局） */
    /* ======================================================= */
    .site-header .wrapper {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      height: 64px !important;
      padding: 0 20px !important;
      box-sizing: border-box !important;
    }

    .site-title {
      float: none !important;
      line-height: 64px !important;
      margin: 0 !important;
      padding: 0 !important;
      display: inline-block !important;
      white-space: nowrap !important;
      color: #2d2d2d !important; /* 默认继承你的护眼深灰字色 */
    }

    .site-nav {
      float: none !important;
      margin: 0 !important;
      padding: 0 !important;
      display: flex !important;
      align-items: center;
    }

    /* 彻底干掉移动端隐藏触发器占用的空间，防止把导航链接顶下去 */
    .nav-trigger,
    .site-nav label[for="nav-trigger"] {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    /* 强行把包裹链接的 .trigger 设为 Flex 行内水平布局 */
    .site-nav .trigger {
      display: flex !important;
      flex-direction: row !important;
      align-items: center !important;
      gap: 20px !important; /* 链接之间的间距 */
      margin: 0 !important;
      padding: 0 !important;
    }

    .site-nav .page-link {
      display: inline-block !important;
      line-height: 64px !important; /* 与标题高度对齐 */
      margin: 0 !important;
      padding: 0 !important;
      color: #555 !important; /* 默认导航字色稍微淡一点，突出层次感 */
    }
  </style>
</head>
