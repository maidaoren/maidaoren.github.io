<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/bootstrap.min.css" | relative_url }}">

  {%- feed_meta -%}

  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  
  <link rel="icon" type="image/jpeg" href="{{ "/assets/img/b.jpg" | relative_url }}">
  <link rel="apple-touch-icon" href="{{ "/assets/img/b.jpg" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/custom-formula.css" | relative_url }}">

  <style>
    /* ======================================================= */
    /* 🆕 0. 全局字体大一统：精细化隔离，保障数字字母不变形，保留衬线美感 */
    /* ======================================================= */
    
    /* 核心正文阅读区（段落、列表、链接、整篇文章）：采用标准防变形衬线链 */
    body, 
    p, 
    li, 
    span, 
    a,
    article {
      /* 完美解决数字(1.5.2)变形！前段为规整的西文衬线，后段为防变形顶级中文宋体 */
      font-family: "Times New Roman", Times, "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", serif !important;
      /* 强迫数字以等宽、齐平的形式渲染（彻底防止 .5. 显得松散、错位） */
      font-variant-numeric: tabular-nums !important;
      letter-spacing: 0.02em; /* 适当增加极细微的字间距，提升阅读的呼吸感 */
    }

    /* 章节与标题区：采用现代挺拔的无衬线字体，与正文形成视觉对比 */
    h1, h2, h3, h4, h5, h6, .chapter-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif !important;
      font-weight: 600 !important;   /* 现代感偏粗设计，不让数字显得单薄 */
      color: #2d2d2d !important;     /* 优雅的深灰黑，比纯黑更有质感 */
      font-variant-numeric: tabular-nums !important;
    }

    /* 严格保护：公式容器内部及 LaTeX 源码的字体绝对不受全局干扰 */
    .custom-formula-container,
    .custom-formula-text,
    .custom-formula-text * {
      font-family: "Times New Roman", Times, serif !important;
    }

    /* ======================================================= */
    /* 1. 全局链接交互：默认无下划线，悬浮时变知乎蓝+出现下划线 */
    /* ======================================================= */
    a,
    .site-footer a,
    .social-media-list a,
    .social-links a {
      text-decoration: none !important;
      transition: color 0.2s ease; /* 丝滑变色过渡 */
    }

    a:hover,
    .site-footer a:hover,
    .social-media-list a:hover,
    .social-links a:hover {
      color: #0084FF !important;            /* 知乎蓝 */
      text-decoration: underline !important; /* 悬浮下划线 */
    }

    /* 让网站主标题在悬浮时不出现下划线，保持干净 */
    .site-title:hover {
      text-decoration: none !important; 
      color: #0084FF !important; /* 悬浮时变蓝，但无下划线 */
    }

    /* ======================================================= */
    /* 2. 头部导航栏对齐与“关于卖刀人”链接生成 */
    /* ======================================================= */
    
    /* 显示左侧的“卖刀人的博客”网站标题 */
    .site-title {
      display: inline-block !important;
      float: none !important;
      line-height: 64px !important;
      margin: 0 !important;
      padding: 0 !important;
      white-space: nowrap !important;
      color: #2d2d2d !important; /* 优雅的深灰色 */
      font-size: 1.25rem !important;
      font-weight: 500 !important;
    }

    /* 🧹 隐藏系统自带的多余、不受控制的原始导航列表 */
    .site-nav {
      display: none !important; 
    }

    /* 🎨 核心：在导航栏容器右侧，用 CSS 直接生成一个干净的“关于卖刀人”链接 */
    .site-header .wrapper::after {
      content: "关于卖刀人";
      cursor: pointer;
      font-size: 1rem;
      font-weight: 400;
      color: #555 !important;
      line-height: 64px;
      transition: color 0.2s ease;
    }

    /* 鼠标悬浮到右侧“关于卖刀人”时的交互状态（变蓝，无下划线） */
    .site-header .wrapper:hover::after {
      color: #0084FF !important;
    }

    /* 链接点击跳转逻辑关联（利用 CSS 的绝对定位使这个区域可点击） */
    .site-header .wrapper {
      position: relative;
      display: flex !important;
      justify-content: space-between !important; /* 左标题，右关于 */
      align-items: center !important;
      height: 64px !important;
      padding: 0 20px !important;
      box-sizing: border-box !important;
      
      /* 让导航栏的最大宽度与文章阅读容器保持一致（820px）并居中对齐 */
      max-width: 820px !important;
      margin: 0 auto !important;
    }

    /* 创建一个隐形的透明覆盖层，覆盖在 ::after 上，实现点击跳转 */
    .site-header .wrapper::before {
      content: "";
      position: absolute;
      right: 20px;
      width: 100px; /* 恰好覆盖“关于卖刀人”文字的宽度 */
      height: 64px;
      z-index: 10;
      cursor: pointer;
    }

    /* ======================================================= */
    /* 🧹 3. 强效靠左对齐：消除段落、列表、卡片的异常缩进与空字 */
    /* ======================================================= */

    /* 确保 Jekyll 默认的文章内容容器、Bootstrap 容器以及自定义容器全部左对齐 */
    .wrapper,
    .post-content,
    .reading-container,
    .about-content,
    article {
      padding-left: 0 !important;
      margin-left: auto;
      margin-right: auto;
    }

    /* 彻底根除段落的首行缩进（首行空两格），保持左边距完全垂直对齐 */
    .post-content p,
    .reading-container p,
    p {
      text-indent: 0 !important;
      padding-left: 0 !important;
      margin-left: 0 !important;
      text-align: left !important;
    }

    /* 优化无序列表 <ul> 和有序列表 <ol> */
    .post-content ul,
    .post-content ol,
    .reading-container ul,
    .reading-container ol,
    ul,
    ol {
      padding-left: 1.25rem !important; 
      margin-left: 0 !important;
      text-align: left !important;
    }

    /* 列表子项 <li> 的文字内容本身不进行额外缩进 */
    li {
      text-indent: 0 !important;
      padding-left: 0 !important;
    }

    /* 确保所有自定义的卡片、警告框等也紧贴左侧对齐线 */
    .reading-container .card,
    .reading-container .alert {
      margin-left: 0 !important;
      margin-right: 0 !important;
      padding-left: 1.25rem !important; /* 内部留适当内边距即可，外部靠左对齐 */
    }

    /* ======================================================= */
    /* 🔒 4. 划词复制优化：阻断 MathJax 渲染实体，指向隐形源码 */
    /* ======================================================= */
    mjx-container, 
    .MathJax, 
    [data-mml-node],
    .mjx-container * {
      user-select: none !important;
      -webkit-user-select: none !important;
    }

    /* 隐形源码层：用户不可见，但完美响应鼠标选中并支持跨浏览器拷贝 */
    .hidden-copy-source {
      position: absolute !important;
      left: 0 !important;
      top: 0 !important;
      width: 1px !important;
      height: 1px !important;
      opacity: 0.0001 !important;
      z-index: -1 !important;
      overflow: hidden !important;
      white-space: nowrap !important;
      user-select: text !important;
      -webkit-user-select: text !important;
    }
  </style>

  <!-- 5. 关于卖刀人点击路由逻辑 -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const headerWrapper = document.querySelector('.site-header .wrapper');
      if (headerWrapper) {
        headerWrapper.addEventListener('click', function(e) {
          const rect = headerWrapper.getBoundingClientRect();
          const clickX = e.clientX - rect.left;
          if (clickX > rect.width - 120) {
            window.location.href = "{{ '/about/' | relative_url }}";
          }
        });
      }
    });
  </script>

  <!-- 6. MathJax 3 深度挂载：从渲染流内部直接输出隐藏复制源 -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      options: {
        renderActions: {
          addCopySource: [200, function (doc) {
            for (const math of doc.math) {
              if (math.state() >= 12) { // 12 代表已经成功生成了 DOM 节点
                const container = math.typesetRoot;
                if (container && !container.nextSibling?.classList?.contains('hidden-copy-source')) {
                  const isDisplay = math.display;
                  const originalText = math.math; // 拿到最纯净原始的 LaTeX 源码
                  
                  if (originalText) {
                    const formattedText = isDisplay ? `\n$$${originalText.trim()}$$\n` : ` $$${originalText.trim()}$$ `;
                    
                    const copySpan = document.createElement('span');
                    copySpan.className = 'hidden-copy-source';
                    copySpan.textContent = formattedText;
                    
                    // 紧跟在渲染出的公式容器后面插入
                    container.parentNode.insertBefore(copySpan, container.nextSibling);
                  }
                }
              }
            }
          }, '']
        }
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
