<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/bootstrap.min.css" | relative_url }}">

  {%- feed_meta -%}

  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  
  <link rel="icon" type="image/jpeg" href="{{ "/assets/img/b.jpg" | relative_url }}">
  <link rel="apple-touch-icon" href="{{ "/assets/img/b.jpg" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/custom-formula.css" | relative_url }}">

<style>
    /* ======================================================= */
    /* 🆕 0. 全局字体大一统：保障数字字母不变形，保留衬线美感 */
    /* ======================================================= */
    
    body, p, li, span, a, article {
      font-family: "Times New Roman", Times, "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", serif !important;
      font-variant-numeric: tabular-nums !important;
      letter-spacing: 0.02em;
    }

    h1, h2, h3, h4, h5, h6, .chapter-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif !important;
      font-weight: 600 !important;
      color: #2d2d2d !important;
      font-variant-numeric: tabular-nums !important;
    }

    /* 严格保护：公式容器内部及 LaTeX 源码的字体绝对不受全局干扰 */
    .custom-formula-container,
    .custom-formula-text,
    .custom-formula-text * {
      font-family: "Times New Roman", Times, serif !important;
    }

    /* ======================================================= */
    /* 1. 全局链接交互：默认无下划线，悬浮时变知乎蓝 */
    /* ======================================================= */
    a, .site-footer a, .social-media-list a, .social-links a {
      text-decoration: none !important;
      transition: color 0.2s ease;
    }

    a:hover, .site-footer a:hover, .social-media-list a:hover, .social-links a:hover {
      color: #0084FF !important;
      text-decoration: underline !important;
    }

    /* ======================================================= */
    /* 🚀 2. 头部导航栏全局吸顶与经典“左右对齐”布局 */
    /* ======================================================= */
    .site-header {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      z-index: 9999 !important;
      height: 64px !important;
      background-color: #ffffff !important; /* 纯白背景，遮挡滚动上来的文章 */
      border-bottom: 1px solid #e8e8e8 !important;
      border-top: none !important;
    }

    /* 导航栏内部的 Flex 容器 */
    .site-header .wrapper {
      position: relative !important;
      display: flex !important;
      justify-content: space-between !important; /* 左“首页”，右“阅读指南”两端对齐 */
      align-items: center !important;
      height: 64px !important;
      padding: 0 20px !important;
      box-sizing: border-box !important;
      max-width: 820px !important;
      margin: 0 auto !important;
      margin-top: 0 !important; /* 强行归零，防止被下方的全局 margin 误伤 */
    }

    /* 🧹 隐藏 Jekyll 默认输出的旧导航结构 */
    .site-nav, .site-title {
      display: none !important; 
    }

    /* 🎨 统一新导航项的基础样式 */
    .nav-item-left,
    .nav-item-right {
      font-size: 1.25rem !important;
      font-weight: 500 !important;
      color: #2d2d2d !important;
      line-height: 64px !important;
      text-decoration: none !important;
      transition: color 0.2s ease !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
    }

    /* 精准悬浮：只有鼠标悬浮在自己身上时才变蓝，绝不连带触发 */
    .nav-item-left:hover,
    .nav-item-right:hover {
      color: #0084FF !important;
      text-decoration: none !important; /* 保持导航栏干净无下划线 */
    }

    /* ======================================================= */
    /* 🎯 3. 统一所有页面内容容器的顶部安全距离（精准防空隙叠置版） */
    /* ======================================================= */
    
    /* 1. 内部包裹容器：只保留小幅间距，防止多层嵌套时 margin-top 堆叠导致大片空白 */
    .post-content,
    .reading-container,
    .about-content,
    article,
    .container {
      margin-top: 24px !important; 
      padding-top: 0 !important;
    }

    /* 2. 最外层整体容器：精准针对导航栏下方的第一个大盒子进行 88px 物理下移 */
    .site-header + .wrapper,
    main.page-content,
    body > .wrapper,
    #main {
      margin-top: 88px !important; /* 64px 导航栏高度 + 24px 极致舒适留白 */
      padding-top: 0 !important;
    }

    /* 彻底根除段落的首行缩进 */
    .post-content p, .reading-container p, p {
      text-indent: 0 !important;
      padding-left: 0 !important;
      margin-left: 0 !important;
      text-align: left !important;
    }

    /* 优化列表排版 */
    .post-content ul, .post-content ol, .reading-container ul, .reading-container ol, ul, ol {
      padding-left: 1.25rem !important;
      margin-left: 0 !important;
      text-align: left !important;
    }

    li {
      text-indent: 0 !important;
      padding-left: 0 !important;
    }

    .reading-container .card, .reading-container .alert {
      margin-left: 0 !important;
      margin-right: 0 !important;
      padding-left: 1.25rem !important;
    }

    /* ======================================================= */
    /* 🔒 4. 划词复制优化 */
    /* ======================================================= */
    mjx-container, .MathJax, [data-mml-node], .mjx-container * {
      user-select: none !important;
      -webkit-user-select: none !important;
    }

    .hidden-copy-source {
      position: absolute !important;
      left: 0 !important;
      top: 0 !important;
      width: 1px !important;
      height: 1px !important;
      opacity: 0.0001 !important;
      z-index: -1 !important;
      overflow: hidden !important;
      white-space: nowrap !important;
      user-select: text !important;
      -webkit-user-select: text !important;
    }
  </style>

  <!-- 5. 🚀 强效、干净的真实 DOM 双极导航栏重构逻辑 -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const headerWrapper = document.querySelector('.site-header .wrapper');
      if (headerWrapper) {
        // 直接重构 wrapper 内部，只塞入两个真实的、两端分布的 <a> 链接
        headerWrapper.innerHTML = `
          <a class="nav-item-left" href="{{ '/' | relative_url }}">首页</a>
          <a class="nav-item-right" href="{{ '/about/' | relative_url }}">阅读指南</a>
        `;
      }
    });
  </script>

  <!-- 6. MathJax 3 深度挂载 -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      options: {
        renderActions: {
          addCopySource: [200, function (doc) {
            for (const math of doc.math) {
              if (math.state() >= 12) {
                const container = math.typesetRoot;
                if (container && !container.nextSibling?.classList?.contains('hidden-copy-source')) {
                  const isDisplay = math.display;
                  const originalText = math.math;
                  
                  if (originalText) {
                    const formattedText = isDisplay ? `\n$$${originalText.trim()}$$\n` : ` $$${originalText.trim()}$$ `;
                    const copySpan = document.createElement('span');
                    copySpan.className = 'hidden-copy-source';
                    copySpan.textContent = formattedText;
                    container.parentNode.insertBefore(copySpan, container.nextSibling);
                  }
                }
              }
            }
          }, '']
        }
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
