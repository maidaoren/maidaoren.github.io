# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: 卖刀人的博客
description: >-
  专注于威权体制，专制社会分析与解构
baseurl: "" 
url: "" 
twitter_username: O0o362
github_username: maidaoren

# Build settings
theme: minima
#plugins:
 # - jekyll-feed

# ====== Markdown 与数学公式核心配置（已合并去重） ======
markdown: kramdown
kramdown:
  input: GFM
  math_engine: null   # 让 Jekyll 后端对公式完全放手，由前端 MathJax 渲染，彻底解决下划线被吞的问题
  
mathjax: true        # 用于激活 head.html 中的判断开关
# ===================================================

include:
  - _includes
  - _layouts

# 网站核心配置
title: "卖刀人的博客"
description: "专注于威权体制，专制社会分析与解构" # 👈 这里写一句话简介，替换掉现在推特里重复的第二行字
url: "https://maidaoren.github.io"          # 👈 必须填写你在线上的完整网址

# Twitter 分享卡片配置
twitter:
  username: "Oo0362"       # 👈 你的推特用户名（不要带 @）
  card: summary            # 👈 summary 代表左侧小图、右侧文字的紧凑卡片（和 image_eb31b1.png 布局一致）

# 默认分享图设置
image: "/assets/img/b.jpg" # 👈 直接指定你在 assets/img 目录下的 b.jpg 作为你的推特分享标识图！

