# -----------------------------------------------------------------------------
# 1. 网站基础信息 (Site Settings)
# -----------------------------------------------------------------------------
title: "卖刀人的博客"
description: "满堂花醉三千客，一剑霜寒十四州"
url: "https://maidaoren.github.io"
baseurl: ""

twitter_username: O0o362
github_username: maidaoren

# -----------------------------------------------------------------------------
# 2. 构建与主题设置 (Build Settings)
# -----------------------------------------------------------------------------
theme: minima

# 插件列表：补全你在 Gemfile 中引用的插件
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 🎯 全站文章列表分页配置（先设为 1 进行测试！）
paginate: 10
paginate_path: "/page:num/"

# -----------------------------------------------------------------------------
# 3. Markdown / Kramdown 引擎与公式配置
# -----------------------------------------------------------------------------
markdown: kramdown
kramdown:
  input: GFM
  # 🎯 锁定直引号，禁用智能引号转换
  smart_quotes: quot,quot,quot,quot
  math_engine: null

mathjax: true

# -----------------------------------------------------------------------------
# 4. 忽略目录 (Exclude - 已剔除 _layouts 与 _includes)
# -----------------------------------------------------------------------------
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/